<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Wealthy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-custom {
            background-color: #4FBBC6;
            border: none;
        }

        .btn-custom:hover {
            background-color: #3aa9b4;
        }

        .navbar .nav-link,
        .navbar .btn {
            color: white !important;
        }

        .section-title {
            margin-top: 40px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light shadow-sm px-3" style="background-color: #003366;">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">
            <img th:src="@{/images/Wealth Front.png}" alt="Wealthy Logo" style="height: 40px;">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-center" id="adminNav">
            <ul class="navbar-nav gap-3">
                <li class="nav-item"><a class="nav-link fw-semibold" th:href="@{/Admin}">Client Details</a></li>
                <li class="nav-item"><a class="nav-link fw-semibold" th:href="@{/complaints}">Complaints</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle fw-semibold" href="#" id="plansDropdown" role="button" data-bs-toggle="dropdown">
                        Plans
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/createplan}">Create Plan</a></li>
                        <li><a class="dropdown-item" th:href="@{/updateplan}">Update Plan</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
  </nav>
<!-- Complaints Section -->
<section class="container" id="complaints">
    <h2 class="text-center section-title">Complaints</h2>
    <p class="text-center">This section will display user complaints (to be implemented).</p>
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
