<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Wealthy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-custom {
            background-color: #4FBBC6;
            border: none;
        }

        .btn-custom:hover {
            background-color: #3aa9b4;
        }

        .navbar .nav-link,
        .navbar .btn {
            color: white !important;
        }

        .section-title {
            margin-top: 40px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light shadow-sm px-3" style="background-color: #003366;">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">
            <img th:src="@{/images/Wealth Front.png}" alt="Wealthy Logo" style="height: 40px;">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-center" id="adminNav">
           <ul class="navbar-nav gap-3">
                <li class="nav-item"><a class="nav-link fw-semibold" th:href="@{/Admin}">Client Details</a></li>
                <li class="nav-item"><a class="nav-link fw-semibold" th:href="@{/complaints}">Complaints</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle fw-semibold" href="#" id="plansDropdown" role="button" data-bs-toggle="dropdown">
                        Plans
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/createplan}">Create Plan</a></li>
                        <li><a class="dropdown-item" th:href="@{/updateplan}">Update Plan</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Client Details Section -->
<section class="container" id="clientDetails">
    <h2 class="text-center section-title">Client Details</h2>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>DOB</th>
                <th>Plan</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="client : ${clients}">
                <td th:text="${client.id}"></td>
                <td th:text="${client.name}"></td>
                <td th:text="${client.email}"></td>
                <td th:text="${client.phoneNumber}"></td>
                <td th:text="${client.dateOfBirth}"></td>
                <td th:text="${client.plan.name}"></td>
                <td th:text="${client.plan.amount}"></td>
            </tr>
        </tbody>
    </table>
</section>



<!-- Footer -->
<footer class="bg-dark text-white py-4 mt-auto">
    <div class="container text-center">
        <p class="mb-1">© 2025 Wealthy. All rights reserved.</p>
        <div>
            <a href="#" class="text-white me-3">Privacy Policy</a>
            <a href="#" class="text-white me-3">Terms of Service</a>
            <a href="#" class="text-white">Contact Us</a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
